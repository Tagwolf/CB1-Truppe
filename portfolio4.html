<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CB1 · WARTUNG</title>
    <!-- Google Fonts & Font Awesome -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ffffff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        /* WEISSES DESIGN */
        .white-container {
            max-width: 700px;
            width: 100%;
            background: #ffffff;
            border-radius: 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08), 0 8px 20px rgba(0, 0, 0, 0.06);
            padding: 4rem 3rem;
            text-align: center;
            border: 1px solid #f0f0f0;
        }

        /* Emoji / Icons */
        .main-icon {
            font-size: 5rem;
            color: #e0e0e0;
            margin-bottom: 1.5rem;
        }

        /* GROSSER TEXT - "wir sind in Wartungsarbeitungen nigger" */
        .main-text {
            font-size: 3.2rem;
            font-weight: 700;
            color: #1a1a1a;
            line-height: 1.2;
            margin-bottom: 2rem;
            letter-spacing: -0.02em;
        }

        /* KLEINER TEXT - "Ja ich habe n pass du nigger" */
        .sub-text {
            font-size: 1.4rem;
            font-weight: 400;
            color: #666666;
            margin-bottom: 3rem;
            font-style: italic;
            border-top: 2px solid #f0f0f0;
            padding-top: 2rem;
        }

        /* Trennlinie */
        .divider {
            width: 80px;
            height: 3px;
            background: #eaeaea;
            margin: 0 auto 2rem;
            border-radius: 10px;
        }

        /* Status-Badge */
        .status-badge {
            display: inline-block;
            background: #f5f5f5;
            color: #444;
            padding: 0.6rem 2rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            border: 1px solid #eaeaea;
            margin-top: 1rem;
        }

        .status-badge i {
            color: #888;
            margin-right: 8px;
        }

        /* Footer klein */
        .footer {
            margin-top: 3rem;
            color: #aaa;
            font-size: 0.9rem;
        }

        /* Responsive */
        @media (max-width: 500px) {
            .white-container {
                padding: 2.5rem 1.5rem;
            }
            .main-text {
                font-size: 2.4rem;
            }
            .sub-text {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="white-container">
        <!-- Icon (dezent) -->
        <div class="main-icon">
            <i class="fas fa-tools"></i>
        </div>

        <!-- GROSSER TEXT (genau wie gewünscht) -->
        <div class="main-text">
            wir sind in <br>Wartungsarbeitungen nigger
        </div>

        <!-- Kleiner Trenner -->
        <div class="divider"></div>

        <!-- KLEINER TEXT (genau wie gewünscht) -->
        <div class="sub-text">
            Ja ich habe n pass du nigger
        </div>

        <!-- Status-Badge zur Auflockerung -->
        <div class="status-badge">
            <i class="fas fa-clock"></i> vorübergehend nicht erreichbar
        </div>

        <!-- Footer mit Hinweis -->
        <div class="footer">
            <i class="far fa-circle"></i> CB1 TRUPPE · wartungsmodus
        </div>
    </div>

    <!-- Ganz unten unsichtbarer Hinweis: Design pur weiß -->
</body>
</html>
